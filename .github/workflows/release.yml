name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bins: salspy-cli salspy-gui
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bins: salspy-cli salspy-gui
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bins: salspy-cli salspy-gui
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bins: salspy-cli.exe salspy-gui.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libdbus-1-dev \
            libgtk-3-dev libglib2.0-dev
      - name: Cache cargo
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build CLI
        run: cargo build --release --bin salspy-cli --target ${{ matrix.target }}
      - name: Build GUI
        run: cargo build --release --bin salspy-gui --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/salspy-cli dist/
          cp target/${{ matrix.target }}/release/salspy-gui dist/
          tar -czf salspy-${{ matrix.target }}.tar.gz -C dist .
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/${{ matrix.target }}/release/salspy-cli.exe dist/
          Copy-Item target/${{ matrix.target }}/release/salspy-gui.exe dist/
          Compress-Archive -Path dist/* -DestinationPath salspy-${{ matrix.target }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: salspy-${{ matrix.target }}.*